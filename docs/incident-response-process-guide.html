<style>
:root{
  --bg:#0f172a;
  --card:#ffffff;
  --text:#111827;
  --muted:#6b7280;
  --gold:#b89a49;
  --border:#e5e7eb;
}

body{
  margin:0;
  font-family: 'Segoe UI', Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
  line-height:1.6;
}

.hero{
  background:#000000;
  color:#ffffff;
  padding:60px 24px;
  text-align:center;
  border-bottom:4px solid var(--gold);
}

.container{
  max-width:1000px;
  margin:auto;
  padding:40px 20px;
}

.section{
  background:var(--card);
  border-radius:12px;
  padding:28px;
  margin-bottom:24px;
  border:1px solid var(--border);
  box-shadow:0 4px 20px rgba(0,0,0,0.08);
}

h1{
  font-size:42px;
  margin-bottom:10px;
  letter-spacing:1px;
}

h2{
  color:var(--text);
  border-left:5px solid var(--gold);
  padding-left:12px;
  margin-bottom:16px;
}

h3{
  color:var(--gold);
}

ul{
  padding-left:20px;
}

li{
  margin-bottom:6px;
}

.note{
  background:#f9fafb;
  border-left:5px solid var(--gold);
  padding:14px;
  border-radius:8px;
  margin-top:12px;
}

.section:hover{
  transform:translateY(-2px);
  transition:0.2s ease;
}
</style>
